version: '3.8'

services:
  webpage_docker:
    build:
      context: ./flask-backend
      dockerfile: Dockerfile
    container_name: webpage_docker
    ports:
      - "5050:5050"
    environment:
      DB_HOST: postgres
      DB_NAME: postgres
      DB_USER: airflow
      DB_PASS: airflow
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    networks:
      - stock_pipeline_network

  front_end:
    build:
      context: ./react-frontend
      dockerfile: Dockerfile
    container_name: react-frontend
    ports:
      - "3030:3000"
    networks:
      - stock_pipeline_network

networks:
  stock_pipeline_network:
    external: true
